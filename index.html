<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

// ─── UG PROXY CONFIG ──────────────────────────────────────────────────────────
// After deploying your Cloudflare Worker, paste its URL here (no trailing slash).
// e.g. 'https://ug-proxy.yourname.workers.dev'
const UG_PROXY_URL = 'https://ug-proxy.zorian.workers.dev';

// ─── MUSIC THEORY ─────────────────────────────────────────────────────────────
const CHROM=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENARH={Db:'C#',Eb:'D#',Gb:'F#',Ab:'G#',Bb:'A#','E#':'F','B#':'C',Cb:'B',Fb:'E'};
const S2FLAT={'C#':'Db','D#':'Eb','G#':'Ab','A#':'Bb'};
const n2s=n=>CHROM.indexOf(ENARH[n]??n);
const CIRCLE_KEYS=['C','G','D','A','E','B','F#','Db','Ab','Eb','Bb','F'];
const CIRCLE_SEMS=[0,7,2,9,4,11,6,1,8,3,10,5];
const FLAT_SEMS=new Set([1,3,5,8,10]);
function s2nSmart(s,flat=false){const n=CHROM[((s%12)+12)%12];return(flat&&S2FLAT[n])?S2FLAT[n]:n;}
function txNote(n,d,flat=false){return s2nSmart(n2s(n)+d,flat);}
function txChord(chord,d,flat=false){
  if(!d)return chord;
  const m=chord.match(/^([A-G][#b]?)(.*)$/);if(!m)return chord;
  const sl=m[2].match(/^(.*)(\/[A-G][#b]?)$/);
  if(sl)return txNote(m[1],d,flat)+sl[1]+'/'+txNote(sl[2].slice(1),d,flat);
  return txNote(m[1],d,flat)+m[2];
}
function shortTx(fromKey,toSem){let d=toSem-n2s(fromKey);while(d>6)d-=12;while(d<=-6)d+=12;return d;}
function isChord(s){
  const t=s.replace(/[\[\]]/g,'').trim();
  if(!t)return false;
  return /^[A-G][#b]?[a-zA-Z0-9#b\+]*(\/[A-G][#b]?)?$/.test(t) && t.length <= 12;
}
const isChordLine=l=>{const t=l.trim();if(!t)return false;const toks=t.split(/\s+/).filter(Boolean);return toks.length>0&&toks.every(tok=>isChord(tok)||/^x\d+$/i.test(tok));};
function isSectionHdr(line){return/^\[[^\[\]]+\]$/.test(line)&&!isChord(line.slice(1,-1));}
function parseSegs(line){
  const rx=/\[([^\[\]]+)\]/g,parts=[];let last=0,m;
  while((m=rx.exec(line))!==null){if(m.index>last)parts.push({t:'txt',v:line.slice(last,m.index)});parts.push({t:'crd',v:m[1]});last=m.index+m[0].length;}
  if(last<line.length)parts.push({t:'txt',v:line.slice(last)});
  const segs=[];
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    if(p.t==='crd'){
      const txt=(i+1<parts.length&&parts[i+1].t==='txt')?parts[i+1].v:'';
      const spaceIdx=txt.indexOf(' ');
      if(spaceIdx===-1){segs.push({chord:p.v,text:txt});if(txt)i++;}
      else{segs.push({chord:p.v,text:txt.slice(0,spaceIdx+1)});parts[i+1].v=txt.slice(spaceIdx+1);}
    }else{
      const segments=p.v.split(/(\s+)/);
      for(const s of segments)if(s)segs.push({chord:null,text:s});
    }
  }
  return segs;
}

// ─── CHORD VOICINGS ───────────────────────────────────────────────────────────
const CV={
  C:[{frets:[-1,3,2,0,1,0],bF:1,lbl:"Open"},{frets:[8,10,10,9,8,8],bF:8,lbl:"8fr",bar:{f:8,a:0,b:5}}],
  D:[{frets:[-1,-1,0,2,3,2],bF:1,lbl:"Open"},{frets:[5,5,7,7,7,5],bF:5,lbl:"5fr",bar:{f:5,a:0,b:5}}],
  E:[{frets:[0,2,2,1,0,0],bF:1,lbl:"Open"},{frets:[7,9,9,8,7,7],bF:7,lbl:"7fr",bar:{f:7,a:0,b:5}}],
  F:[{frets:[1,3,3,2,1,1],bF:1,lbl:"Barre",bar:{f:1,a:0,b:5}},{frets:[-1,-1,3,2,1,1],bF:1,lbl:"Mini-F"}],
  G:[{frets:[3,2,0,0,0,3],bF:1,lbl:"Open"},{frets:[3,5,5,4,3,3],bF:3,lbl:"3fr",bar:{f:3,a:0,b:5}}],
  A:[{frets:[-1,0,2,2,2,0],bF:1,lbl:"Open"},{frets:[5,7,7,6,5,5],bF:5,lbl:"5fr",bar:{f:5,a:0,b:5}}],
  B:[{frets:[-1,2,4,4,4,2],bF:2,lbl:"Barre",bar:{f:2,a:1,b:5}}],
  Am:[{frets:[-1,0,2,2,1,0],bF:1,lbl:"Open"},{frets:[5,7,7,5,5,5],bF:5,lbl:"5fr",bar:{f:5,a:0,b:5}}],
  Em:[{frets:[0,2,2,0,0,0],bF:1,lbl:"Open"},{frets:[7,9,9,7,7,7],bF:7,lbl:"7fr",bar:{f:7,a:0,b:5}}],
  Dm:[{frets:[-1,-1,0,2,3,1],bF:1,lbl:"Open"},{frets:[5,5,7,7,6,5],bF:5,lbl:"5fr",bar:{f:5,a:0,b:5}}],
  Bm:[{frets:[-1,2,4,4,3,2],bF:2,lbl:"Barre",bar:{f:2,a:1,b:5}}],
  Cm:[{frets:[3,3,5,5,4,3],bF:3,lbl:"3fr",bar:{f:3,a:0,b:5}}],
  "F#m":[{frets:[2,4,4,2,2,2],bF:2,lbl:"Barre",bar:{f:2,a:0,b:5}}],
  "C#m":[{frets:[4,6,6,4,4,4],bF:4,lbl:"Barre",bar:{f:4,a:0,b:5}}],
  "G#m":[{frets:[4,6,6,4,4,4],bF:4,lbl:"4fr",bar:{f:4,a:0,b:5}}],
  G7:[{frets:[3,2,0,0,0,1],bF:1,lbl:"Open"}],
  D7:[{frets:[-1,-1,0,2,1,2],bF:1,lbl:"Open"}],
  A7:[{frets:[-1,0,2,0,2,0],bF:1,lbl:"Open"}],
  E7:[{frets:[0,2,0,1,0,0],bF:1,lbl:"Open"}],
  B7:[{frets:[-1,2,1,2,0,2],bF:1,lbl:"Open"}],
  Am7:[{frets:[-1,0,2,0,1,0],bF:1,lbl:"Open"}],
  Em7:[{frets:[0,2,0,0,0,0],bF:1,lbl:"Open"}],
  Dm7:[{frets:[-1,-1,0,2,1,1],bF:1,lbl:"Open"}],
  Cmaj7:[{frets:[-1,3,2,0,0,0],bF:1,lbl:"Open"}],
  Gmaj7:[{frets:[3,2,0,0,0,2],bF:1,lbl:"Open"}],
  Fmaj7:[{frets:[-1,-1,3,2,1,0],bF:1,lbl:"Open"}],
  Cadd9:[{frets:[-1,3,2,0,3,3],bF:1,lbl:"Open"}],
  Dsus4:[{frets:[-1,-1,0,2,3,3],bF:1,lbl:"Open"}],
  Asus4:[{frets:[-1,0,2,2,3,0],bF:1,lbl:"Open"}],
  Gsus4:[{frets:[3,3,0,0,1,3],bF:1,lbl:"Open"}],
  Am7:[{frets:[-1,0,2,0,1,0],bF:1,lbl:"Open"}],
  Db:[{frets:[-1,4,6,6,6,4],bF:4,lbl:"4fr",bar:{f:4,a:1,b:5}}],
  "F#":[{frets:[2,4,4,3,2,2],bF:2,lbl:"2fr",bar:{f:2,a:0,b:5}}],
  Ab:[{frets:[4,6,6,5,4,4],bF:4,lbl:"4fr",bar:{f:4,a:0,b:5}}],
  Bb:[{frets:[-1,1,3,3,3,1],bF:1,lbl:"A-shape",bar:{f:1,a:1,b:5}},{frets:[6,8,8,7,6,6],bF:6,lbl:"E-shape",bar:{f:6,a:0,b:5}}],
  Eb:[{frets:[-1,6,8,8,8,6],bF:6,lbl:"6fr",bar:{f:6,a:1,b:5}}],
  "D/F#":[{frets:[2,0,0,2,3,2],bF:1,lbl:"Open"}],
};
function getVoicings(name){
  if(CV[name])return CV[name];
  const m=name.match(/^([A-G][#b]?)(.*)/);if(!m)return null;
  const sem=n2s(m[1]);if(sem<0)return null;
  const q=m[2],sharp=CHROM[((sem%12)+12)%12]+q,flat=(S2FLAT[CHROM[((sem%12)+12)%12]]||CHROM[((sem%12)+12)%12])+q;
  return CV[sharp]||CV[flat]||null;
}

// ─── TAB IMPORTER ─────────────────────────────────────────────────────────────
function parseTabImport(raw){
  const lines=raw.split('\n');
  let title='Imported Song',artist='Unknown',key='G',capo=0;
  for(const line of lines){const t=line.trim();if(!t)continue;const m=t.match(/^(.+?)\s+(?:chords?\s+)?by\s+(.+?)$/i);if(m){title=m[1].replace(/\s+chords?$/i,'').trim();artist=m[2].trim();}break;}
  for(const line of lines){const t=line.trim();const km=t.match(/^Key:\s*([A-G][#b]?m?)/i);if(km)key=km[1];const cm=t.match(/^Capo[:\s]+(\d+)/i);if(cm)capo=parseInt(cm[1]);}
  const hasInline=lines.some(l=>/\[[A-G][#b]?/.test(l)&&!isSectionHdr(l.trim()));
  if(hasInline){const si=lines.findIndex(l=>isSectionHdr(l.trim())||/\[[A-G][#b]?/.test(l));return{title,artist,key,capo,tempo:100,content:lines.slice(Math.max(0,si)).join('\n').trim()};}
  let startIdx=lines.findIndex(l=>{const t=l.trim();return/^\[.+\]$/.test(t)&&!isChord(t.slice(1,-1));});
  if(startIdx===-1)startIdx=0;
  const isTabLine=l=>/^\s*[eEBGDAd]\|/.test(l);
  const isChordLine=l=>{const t=l.trim();if(!t)return false;const toks=t.split(/\s+/).filter(Boolean);return toks.length>0&&toks.every(tok=>isChord(tok)||/^x\d+$/i.test(tok));};
  const mergeChordLyric=(cl,ll)=>{
    const chords=[];const rx=/(\S+)/g;let m;
    while((m=rx.exec(cl))!==null){
      const name=m[1].replace(/[\[\]]/g,'');
      if(isChord(name))chords.push({chord:name,col:m.index});
    }
    if(!chords.length)return ll.trimEnd();
    let result=ll;while(result.length<chords[chords.length-1].col)result+=' ';
    for(let i=chords.length-1;i>=0;i--){
      const{chord,col}=chords[i];
      const at=Math.min(col,result.length);
      result=result.slice(0,at)+'['+chord+']'+result.slice(at);
    }
    return result.trimEnd();
  };
  const cl=lines.slice(startIdx);const out=[];let i=0;
  while(i<cl.length){
    const line=cl[i];const t=line.trim();
    if(/^Page\s+\d+\/\d+/i.test(t)||isTabLine(line)||/^\s*Fill\s+\d+/i.test(line)||/^[\/\\]\s*=/.test(t)||/^(?:Link to|Tuning:|Difficulty:|Strumming|Suggested|Alternative)/i.test(t)||(/^[\d\s&]+$/.test(t)&&t.length<20)){i++;continue;}
    if(/^\[.+\]$/.test(t)&&!isChord(t.slice(1,-1))){out.push(t);i++;continue;}
    if(!t){out.push('');i++;continue;}
    if(isChordLine(line)){
      const nextLine=cl[i+1];
      if(nextLine!==undefined){const nextT=nextLine.trim();const ok=nextT&&!isChordLine(nextLine)&&!isTabLine(nextLine)&&!/^\[.+\]$/.test(nextT);if(ok){out.push(mergeChordLyric(line,nextLine));i+=2;continue;}}
      const chords=t.split(/\s+/).filter(tok=>isChord(tok));if(chords.length)out.push(chords.map(c=>'['+c+']').join(''));i++;continue;
    }
    out.push(t);i++;
  }
  const cleaned=[];let pb=false;
  for(const l of out){if(l===''){if(!pb)cleaned.push('');pb=true;}else{cleaned.push(l);pb=false;}}
  return{title,artist,key,capo,tempo:100,content:cleaned.join('\n').trim()};
}

// Convert UG's inline [ch]Chord[/ch] format → TabIt's [Chord] inline format,
// then hand off to the existing parseTabImport pipeline.
function parseUGContent(raw, meta={}){
  const converted = raw
    .replace(/\[tab\]([\s\S]*?)\[\/tab\]/g, '$1')
    .replace(/\[ch\]/g, '   [')
    .replace(/\[\/ch\]/g, ']   ')
    .trim();
  const header = [
    meta.title && meta.artist ? `${meta.title} Chords by ${meta.artist}` : '',
    meta.key   ? `Key: ${meta.key}`  : '',
    meta.capo  ? `Capo: ${meta.capo}` : '',
  ].filter(Boolean).join('\n');
  return parseTabImport(header ? header + '\n\n' + converted : converted);
}

// ─── GITHUB API HELPERS ───────────────────────────────────────────────────────
const GH_API='https://api.github.com';

// Read a file from the repo, returns {content, sha}
async function ghGetFile(owner,repo,path,token){
  const h={'Accept':'application/vnd.github.v3+json'};
  if(token)h['Authorization']=`token ${token}`;
  const r=await fetch(`${GH_API}/repos/${owner}/${repo}/contents/${path}`,{headers:h});
  if(!r.ok){
    if(r.status===404)return null; // file doesn't exist yet
    throw new Error(`GitHub ${r.status} reading ${path}`);
  }
  const d=await r.json();
  return{content:atob(d.content.replace(/\n/g,'')),sha:d.sha};
}

// Write (create or update) a file in the repo
async function ghPutFile(owner,repo,path,content,message,token,sha=null){
  const encoded=btoa(unescape(encodeURIComponent(content)));
  const body={message,content:encoded};
  if(sha)body.sha=sha;
  const r=await fetch(`${GH_API}/repos/${owner}/${repo}/contents/${path}`,{
    method:'PUT',
    headers:{'Accept':'application/vnd.github.v3+json','Content-Type':'application/json',
              'Authorization':`token ${token}`},
    body:JSON.stringify(body),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`GitHub ${r.status}: ${e.message||'unknown error'}`);}
  return r.json();
}

// Read a file via raw.githubusercontent.com (no auth, no rate-limit concern for reading)
async function ghRaw(owner,repo,path){
  const r=await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/${path}?t=${Date.now()}`);
  if(!r.ok)throw new Error(`Could not fetch ${path} (${r.status})`);
  return r.text();
}

// Gist: create a new private gist, returns gistId
async function ghCreateGist(token,content){
  const r=await fetch(`${GH_API}/gists`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`token ${token}`},
    body:JSON.stringify({description:'TabIt Songs Backup',public:false,files:{'tabit-songs.json':{content}}}),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`Create gist: ${r.status} ${e.message||''}`);}
  return (await r.json()).id;
}

// Gist: update existing gist
async function ghUpdateGist(token,gistId,content){
  const r=await fetch(`${GH_API}/gists/${gistId}`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','Authorization':`token ${token}`},
    body:JSON.stringify({files:{'tabit-songs.json':{content}}}),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`Update gist: ${r.status} ${e.message||''}`);}
}

// Gist: fetch content
async function ghGetGist(token,gistId){
  const h={};if(token)h['Authorization']=`token ${token}`;
  const r=await fetch(`${GH_API}/gists/${gistId}`,{headers:h});
  if(!r.ok)throw new Error(`Fetch gist: ${r.status}`);
  const d=await r.json();
  const file=d.files['tabit-songs.json'];
  if(!file)throw new Error('No tabit-songs.json in gist');
  if(file.truncated){const r2=await fetch(file.raw_url);return r2.text();}
  return file.content;
}

// Make a stable URL slug from title+artist
function slugify(title,artist){
  return `${title}-${artist}`.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,64);
}

// ─── CHORD DIAGRAM ────────────────────────────────────────────────────────────
function ChordDiagram({chordName,voicing,capo}){
  if(!voicing)return(
    <div style={{padding:'20px 10px',textAlign:'center',color:'var(--text-sub)',fontSize:13}}>
      No diagram for <strong style={{color:'var(--chord)'}}>{chordName}</strong>
    </div>
  );
  const{frets,bF,bar}=voicing;
  const W=154,H=172,PL=26,PT=42,PR=18;
  const sw=(W-PL-PR)/5,fh=(H-PT-14)/5;
  return(
    <svg width={W} height={H} style={{display:'block',overflow:'visible'}}>
      <text x={W/2} y={15} textAnchor="middle" fontSize={15} fill="var(--text)" fontWeight="700" fontFamily="Georgia,serif">{chordName}</text>
      {capo>0&&bF===1&&<text x={W/2} y={PT-5} textAnchor="middle" fontSize={8} fill="var(--text-sub)">Capo {capo}</text>}
      {bF===1
        ?<rect x={PL} y={PT} width={5*sw} height={3.5} fill="var(--chord)" rx={2}/>
        :<text x={PL-4} y={PT+fh*0.55} fontSize={9} fill="var(--chord)" textAnchor="end">{bF}fr</text>}
      {[0,1,2,3,4,5].map(i=><line key={'h'+i} x1={PL} y1={PT+i*fh} x2={PL+5*sw} y2={PT+i*fh} stroke="var(--border2)" strokeWidth={1.5}/>)}
      {[0,1,2,3,4,5].map(i=><line key={'v'+i} x1={PL+i*sw} y1={PT} x2={PL+i*sw} y2={PT+5*fh} stroke="var(--border2)" strokeWidth={1.5}/>)}
      {bar&&<rect x={PL+bar.a*sw} y={PT+(bar.f-bF+0.5)*fh-2.5} width={(bar.b-bar.a)*sw} height={5} fill="var(--chord)" rx={2.5}/>}
      {frets.map((f,si)=>{
        const x=PL+si*sw;
        if(f===-1)return<text key={si} x={x} y={PT-10} textAnchor="middle" fontSize={12} fill="var(--danger)" fontWeight="bold">x</text>;
        if(f===0)return<circle key={si} cx={x} cy={PT-11} r={5} fill="none" stroke="var(--chord)" strokeWidth={1.5}/>;
        return<circle key={si} cx={x} cy={PT+(f-bF+0.5)*fh} r={7.5} fill="var(--chord)"/>;
      })}
      <text x={W/2} y={H} textAnchor="middle" fontSize={9} fill="var(--text-faint)" fontFamily="Georgia,serif">{voicing.lbl}</text>
    </svg>
  );
}

function CircleOfFifths({originalKey,semitones,onChange,onClose}){
  const origSem=n2s(originalKey)%12,currSem=((origSem+semitones)%12+12)%12;
  const sz=Math.min(window.innerWidth-48,300);
  return(<>
    <div className="sheet-overlay" onClick={onClose}/>
    <div className="sheet" style={{paddingLeft:20,paddingRight:20}}>
      <div className="sheet-handle"/>
      <div className="sheet-header">
        <span className="sheet-title">Transpose</span>
        <button className="sheet-close" onClick={onClose}>✕</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,paddingBottom:24}}>
        <div style={{color:'var(--text-sub)',fontSize:12}}>Tap a key to transpose</div>
        <svg viewBox="-130 -130 260 260" width={sz} height={sz}>
          {CIRCLE_KEYS.map((key,i)=>{
            const angle=(i*30-90)*Math.PI/180,R=95,x=Math.cos(angle)*R,y=Math.sin(angle)*R;
            const ks=CIRCLE_SEMS[i],isOrig=ks===origSem,isCurr=ks===currSem;
            return(<g key={key} onClick={()=>onChange(shortTx(originalKey,ks))} style={{cursor:'pointer'}}>
              <circle cx={x} cy={y} r={20} fill={isCurr?'var(--accent)':isOrig?'var(--chord-bg)':'var(--surface)'} stroke={isCurr?'var(--accent)':isOrig?'var(--chord-border)':'var(--border)'} strokeWidth={isCurr?2.5:isOrig?2:1}/>
              <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize={12} fill={isCurr?'var(--accent-text)':isOrig?'var(--chord)':'var(--text-sub)'} fontWeight={isCurr||isOrig?'bold':'normal'} fontFamily="Georgia,serif">{key}</text>
            </g>);
          })}
          <circle cx={0} cy={0} r={55} fill="var(--surface)" stroke="var(--border)"/>
          <text x={0} y={-12} textAnchor="middle" fontSize={24} fill="var(--chord)" fontWeight="bold" fontFamily="Georgia,serif">{semitones>0?'+'+semitones:semitones}</text>
          <text x={0} y={6} textAnchor="middle" fontSize={10} fill="var(--text-sub)" fontFamily="Georgia,serif">semitones</text>
          <text x={0} y={22} textAnchor="middle" fontSize={12} fill="var(--text)" fontWeight="bold" fontFamily="Georgia,serif">{txChord(originalKey,semitones,FLAT_SEMS.has(((n2s(originalKey)+semitones)%12+12)%12))}</text>
        </svg>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>onChange(0)} className="btn-secondary">Reset</button>
          <button onClick={onClose} className="btn-primary">Done</button>
        </div>
      </div>
    </div>
  </>);
}

// ─── SONG LINE ─────────────────────────────────────────────────────────────────
// Each segment is an inline-flex column: chord sits directly above its lyric text.
// This means chords can NEVER overlap the line above — each line is fully self-contained.
function SongLine({line,onChordClick,semitones,fontSize}){
  if(isSectionHdr(line))return(
    <div style={{color:'var(--accent)',fontWeight:700,fontSize:fontSize*0.8,
      marginTop:fontSize*1.6,marginBottom:fontSize*0.4,letterSpacing:'0.12em',
      textTransform:'uppercase',fontFamily:"'Crimson Text',Georgia,serif",
      borderBottom:'1px solid var(--chord-border)',paddingBottom:3}}>
      {line.slice(1,-1)}
    </div>
  );
  if(!line.trim())return<div style={{height:'0.7em'}}/>;
  const useFlat=FLAT_SEMS.has(((n2s(line.match(/\[([A-G][#b]?)/)?.[1]||'C')+semitones)%12+12)%12);
  const segs=parseSegs(line);
  const hasText=segs.some(s=>s.text.trim()),hasChords=segs.some(s=>s.chord);

  // Chord-only line → badges in a wrapping flex row
  if(!hasText&&hasChords)return(
    <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:'0.6em',marginTop:'0.2em'}}>
      {segs.filter(s=>s.chord).map((s,i)=>{
        const d=txChord(s.chord,semitones,useFlat);
        return<button key={i} className="chord-badge" style={{fontSize}} onClick={()=>onChordClick(d)}>{d}</button>;
      })}
    </div>
  );

  return(
    <div style={{marginBottom:'0.55em',fontFamily:"'Courier Prime','Courier New',monospace",lineHeight:1.85}}>
      <div style={{display:'flex',flexWrap:'wrap',alignItems:'flex-end'}}>
        {segs.map((seg,i)=>{
          const disp=seg.chord?txChord(seg.chord,semitones,useFlat):null;
          const mw=Math.max(disp?disp.length+0.8:0,seg.text.length||0);
          return(
            <span key={i} style={{display:'inline-flex',flexDirection:'column',alignItems:'flex-start',
              minWidth:mw>0?mw+'ch':undefined,whiteSpace:'nowrap'}}>
              {hasChords&&(
                <span style={{height:'1.6em',display:'flex',alignItems:'center',paddingRight:2}}>
                  {disp&&<button className="chord-badge"
                    style={{fontSize:Math.round(fontSize*0.87),whiteSpace:'nowrap',cursor:'pointer'}}
                    onClick={()=>onChordClick(disp)}>{disp}</button>}
                </span>
              )}
              <span style={{color:'var(--lyric)',fontSize,whiteSpace:'pre',lineHeight:1.85}}>
                {seg.text||' '}
              </span>
            </span>
          );
        })}
      </div>
    </div>
  );
}

// ─── ULTIMATE GUITAR SEARCH ──────────────────────────────────────────────────
function UGSearch({onImport,onClose}){
  const[q,setQ]=useState('');
  const[results,setResults]=useState(null);
  const[loading,setLoading]=useState(false);
  const[status,setStatus]=useState('');
  const[preview,setPreview]=useState(null);
  const[loadingTab,setLoadingTab]=useState(false);

  const doSearch=async()=>{
    if(!q.trim())return;
    setLoading(true);setResults(null);setStatus('');
    try{
      const res=await fetch(`${UG_PROXY_URL}?action=search&q=${encodeURIComponent(q)}`);
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      setResults(data.results);
      if(data.results.length===0)setStatus('No results found.');
    }catch(e){setStatus('Search failed: '+e.message);}
    setLoading(false);
  };

  const openTab=async(entry)=>{
    setLoadingTab(true);setStatus('');
    try{
      const res=await fetch(`${UG_PROXY_URL}?action=tab&url=${encodeURIComponent(entry.url)}`);
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      const parsed=parseUGContent(data.content,{title:entry.title,artist:entry.artist});
      setPreview({...parsed,_type:entry.type,_rating:entry.rating,_votes:entry.votes});
    }catch(e){setStatus('Could not load tab: '+e.message);}
    setLoadingTab(false);
  };

  // ── Not configured ──
  if(!UG_PROXY_URL)return(
    <div style={{padding:'24px 20px',textAlign:'center',display:'flex',flexDirection:'column',gap:12,alignItems:'center'}}>
      <span style={{fontSize:40}}>🔧</span>
      <div style={{fontWeight:700,fontSize:16,color:'var(--text)'}}>Proxy not configured</div>
      <div style={{color:'var(--text-sub)',fontSize:13,lineHeight:1.6,maxWidth:280}}>
        Deploy the Cloudflare Worker and paste its URL into <code style={{background:'var(--surface2)',borderRadius:4,padding:'1px 5px'}}>UG_PROXY_URL</code> in the app code.
      </div>
    </div>
  );

  // ── Preview ──
  if(preview) return <UGPreview preview={preview} onBack={()=>setPreview(null)} onImport={onImport} onClose={onClose} />;


  // ── Search + Results ──
  return(
    <div style={{padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:8}}>
        <input value={q} onChange={e=>setQ(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&doSearch()}
          placeholder="Song title or artist…" className="inp" style={{flex:1}} autoFocus/>
        <button onClick={doSearch} className="btn-primary"
          style={{padding:'10px 16px',fontSize:14,opacity:q.trim()?1:0.5,flexShrink:0}}>
          {loading?<span className="spinner"/>:'Search'}
        </button>
      </div>
      {status&&<div style={{background:'var(--surface2)',borderRadius:8,padding:'10px 12px',color:'var(--danger)',fontSize:13}}>{status}</div>}
      {loadingTab&&<div style={{display:'flex',gap:8,color:'var(--text-sub)',fontSize:13,alignItems:'center'}}><span className="spinner"/>Loading tab…</div>}
      {results&&<div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:360,overflowY:'auto'}}>
        {results.map((r,i)=>(
          <button key={i} onClick={()=>openTab(r)}
            style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',
              background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,
              cursor:'pointer',textAlign:'left',width:'100%'}}>
            <span style={{fontSize:20,flexShrink:0}}>🎸</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:15,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
              <div style={{color:'var(--text-sub)',fontSize:12}}>{r.artist}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,flexShrink:0}}>
              <span className="tag" style={{fontSize:10}}>{r.type}</span>
              {r.votes>0&&<span style={{color:'var(--text-faint)',fontSize:11}}>★ {r.rating.toFixed(1)}</span>}
            </div>
          </button>
        ))}
      </div>}
      {results&&results.length===0&&(
        <div style={{color:'var(--text-faint)',fontSize:13,textAlign:'center',padding:'24px 0'}}>No results for "{q}"</div>
      )}
    </div>
  );
}

// ─── GLOBAL LIBRARY SEARCH ────────────────────────────────────────────────────
function GlobalLibrarySearch({cfg,onImport,onClose}){
  const[q,setQ]=useState('');
  const[index,setIndex]=useState(null);
  const[status,setStatus]=useState('');
  const[loading,setLoading]=useState(true);
  const[preview,setPreview]=useState(null);
  const[loadingPreview,setLoadingPreview]=useState(false);

  useEffect(()=>{
    if(!cfg.ghOwner||!cfg.ghRepo){setStatus('Set your GitHub owner and repo name in Settings.');setLoading(false);return;}
    ghRaw(cfg.ghOwner,cfg.ghRepo,'songs/index.json')
      .then(txt=>{setIndex(JSON.parse(txt));setLoading(false);})
      .catch(e=>{setStatus('Could not load global library: '+e.message);setLoading(false);});
  },[]);

  const results=useMemo(()=>{
    if(!index)return[];
    if(!q.trim())return index;
    const lq=q.toLowerCase();
    return index.filter(s=>(s.title+' '+s.artist).toLowerCase().includes(lq));
  },[index,q]);

  const openPreview=async(entry)=>{
    setLoadingPreview(true);
    try{
      const txt=await ghRaw(cfg.ghOwner,cfg.ghRepo,'songs/'+entry.filename);
      setPreview(JSON.parse(txt));
    }catch(e){setStatus('Could not load song: '+e.message);}
    setLoadingPreview(false);
  };

  if(preview)return(
    <div style={{padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button onClick={()=>setPreview(null)} className="btn-secondary" style={{padding:'6px 12px'}}>← Back</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:17,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{preview.title}</div>
          <div style={{color:'var(--text-sub)',fontSize:13}}>{preview.artist}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['Key '+preview.key,preview.capo>0?'Capo '+preview.capo:null,preview.tempo+' bpm'].filter(Boolean).map(t=><span key={t} className="tag">{t}</span>)}
      </div>
      <div style={{background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border)',padding:12,maxHeight:220,overflowY:'auto'}}>
        <pre style={{fontFamily:"'Courier Prime',monospace",fontSize:11,color:'var(--text-sub)',lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{preview.content.slice(0,600)}{preview.content.length>600?'\n…':''}</pre>
      </div>
      <button onClick={()=>{onImport({...preview,id:Date.now(),liked:false,cover:null});onClose();}}
        className="btn-primary" style={{width:'100%',padding:13,fontSize:15}}>
        Add to My Library ✓
      </button>
    </div>
  );

  return(
    <div style={{padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:12}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by title or artist…" className="inp" autoFocus/>
      {status&&<div style={{background:'var(--surface2)',borderRadius:8,padding:'10px 12px',color:'var(--danger)',fontSize:13}}>{status}</div>}
      {loading&&<div style={{display:'flex',gap:8,color:'var(--text-sub)',fontSize:13,alignItems:'center',padding:'12px 0'}}><span className="spinner"/>Loading global library…</div>}
      {loadingPreview&&<div style={{display:'flex',gap:8,color:'var(--text-sub)',fontSize:13,alignItems:'center'}}><span className="spinner"/>Loading song…</div>}
      <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:340,overflowY:'auto'}}>
        {results.map((entry,i)=>(
          <button key={i} onClick={()=>openPreview(entry)}
            style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',
              background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,
              cursor:'pointer',textAlign:'left',width:'100%'}}>
            <span style={{fontSize:20,flexShrink:0}}>🎵</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:15,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{entry.title}</div>
              <div style={{color:'var(--text-sub)',fontSize:12}}>{entry.artist} · Key {entry.key}{entry.capo>0?' · Capo '+entry.capo:''}</div>
            </div>
            <span style={{color:'var(--text-ghost)',fontSize:20,flexShrink:0}}>›</span>
          </button>
        ))}
        {index&&results.length===0&&q&&<div style={{color:'var(--text-faint)',fontSize:13,textAlign:'center',padding:'24px 0'}}>No songs match "{q}"</div>}
        {index&&index.length===0&&!q&&(
          <div style={{textAlign:'center',padding:'32px 0',color:'var(--text-faint)'}}>
            <div style={{fontSize:36,marginBottom:10}}>🌐</div>
            <div style={{fontSize:14,fontFamily:"'Crimson Text',Georgia,serif"}}>Global library is empty.</div>
            <div style={{fontSize:12,marginTop:4}}>Be the first — open any song and tap "Contribute".</div>
          </div>
        )}
      </div>
      {index&&<div style={{color:'var(--text-ghost)',fontSize:11,textAlign:'center',paddingTop:4}}>
        {index.length} song{index.length!==1?'s':''} in global library
      </div>}
    </div>
  );
}

// ─── NEW SONG SHEET ───────────────────────────────────────────────────────────
function NewSongSheet({cfg,onClose,onWriteNew,onImport}){
  const[mode,setMode]=useState(null); // null | 'paste' | 'global' | 'ug'
  const[raw,setRaw]=useState('');
  const[preview,setPreview]=useState(null);
  const[pasteStep,setPasteStep]=useState('paste');
  const fileRef=useRef();

  // ── Paste tab mode ──
  if(mode==='paste')return(<>
    <div className="sheet-overlay" onClick={onClose}/>
    <div className="sheet" style={{maxHeight:'94dvh'}}>
      <div className="sheet-handle"/>
      <div className="sheet-header">
        <span className="sheet-title">{pasteStep==='paste'?'Paste Tab':'Review'}</span>
        <button className="sheet-close" onClick={()=>setMode(null)}>✕</button>
      </div>
      {pasteStep==='paste'&&(
        <div style={{padding:'0 20px 20px',display:'flex',flexDirection:'column',gap:14}}>
          <div style={{color:'var(--text-sub)',fontSize:13,lineHeight:1.5}}>Copy from UltimateGuitar or any tab site. Chords-above-lyrics format auto-converts.</div>
          <textarea value={raw} onChange={e=>setRaw(e.target.value)}
            placeholder={"Something In The Orange Chords by Zach Bryan\nKey: G\n\n[Verse 1]\n     Em7                G\nIt'll be fine by dusk light..."}
            style={{background:'var(--surface2)',border:'1.5px solid var(--border)',borderRadius:10,padding:12,
              color:'var(--text)',fontFamily:"'Courier Prime',monospace",fontSize:12,resize:'none',
              outline:'none',lineHeight:1.7,height:210,width:'100%'}}/>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setMode(null)} className="btn-secondary" style={{flex:1}}>← Back</button>
            <button onClick={()=>{if(raw.trim()){setPreview(parseTabImport(raw));setPasteStep('review');}}}
              className="btn-primary" style={{flex:2,opacity:raw.trim()?1:0.5}}>
              Parse &amp; Preview →
            </button>
          </div>
        </div>
      )}
      {pasteStep==='review'&&preview&&(
        <div style={{padding:'0 20px 20px',display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[['Title',preview.title,t=>setPreview(p=>({...p,title:t}))],
              ['Artist',preview.artist,t=>setPreview(p=>({...p,artist:t}))],
              ['Key',preview.key,t=>setPreview(p=>({...p,key:t}))],
              ['Capo',String(preview.capo),t=>setPreview(p=>({...p,capo:+t}))]
            ].map(([l,v,sv])=>(
              <div key={l}>
                <label style={{display:'block',color:'var(--text-faint)',fontSize:10,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.08em'}}>{l}</label>
                <input className="inp" style={{fontSize:13}} value={v} onChange={e=>sv(e.target.value)}/>
              </div>
            ))}
          </div>
          <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:10,maxHeight:140,overflowY:'auto'}}>
            <pre style={{fontFamily:"'Courier Prime',monospace",fontSize:11,color:'var(--text-sub)',lineHeight:1.5,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
              {preview.content.slice(0,400)}{preview.content.length>400?'\n…':''}
            </pre>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setPasteStep('paste')} className="btn-secondary" style={{flex:1}}>← Back</button>
            <button onClick={()=>{onImport({...preview,id:Date.now(),liked:false,cover:null});onClose();}}
              className="btn-primary" style={{flex:2}}>Add to Library ✓</button>
          </div>
        </div>
      )}
    </div>
  </>);

  // ── UG search mode ──
  if(mode==='ug')return(<>
    <div className="sheet-overlay" onClick={onClose}/>
    <div className="sheet" style={{maxHeight:'94dvh'}}>
      <div className="sheet-handle"/>
      <div className="sheet-header">
        <span className="sheet-title">🎸 Search Ultimate Guitar</span>
        <button className="sheet-close" onClick={()=>setMode(null)}>✕</button>
      </div>
      <UGSearch onImport={onImport} onClose={onClose}/>
    </div>
  </>);

  // ── Global library mode ──
  if(mode==='global')return(<>
    <div className="sheet-overlay" onClick={onClose}/>
    <div className="sheet" style={{maxHeight:'94dvh'}}>
      <div className="sheet-handle"/>
      <div className="sheet-header">
        <span className="sheet-title">🌐 Global Library</span>
        <button className="sheet-close" onClick={()=>setMode(null)}>✕</button>
      </div>
      <GlobalLibrarySearch cfg={cfg} onImport={onImport} onClose={onClose}/>
    </div>
  </>);

  // ── Main menu ──
  return(<>
    <div className="sheet-overlay" onClick={onClose}/>
    <div className="sheet">
      <div className="sheet-handle"/>
      <div className="sheet-header">
        <span className="sheet-title">Add Song</span>
        <button className="sheet-close" onClick={onClose}>✕</button>
      </div>
      <div style={{padding:'0 20px 28px',display:'flex',flexDirection:'column',gap:10}}>
        <input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}}
          onChange={e=>{
            const file=e.target.files[0];if(!file)return;
            const reader=new FileReader();
            reader.onload=ev=>{
              try{
                const data=JSON.parse(ev.target.result);
                const arr=Array.isArray(data)?data:[data];
                arr.forEach(s=>{if(s.title&&s.content)onImport({...s,id:Date.now()+Math.random(),cover:s.cover||null});});
                onClose();
              }catch{alert('Invalid JSON file');}
            };
            reader.readAsText(file);e.target.value='';
          }}/>
        {[
          ['✏️','Write from Scratch','Blank editor with chord palette',()=>{onWriteNew();onClose();}],
          ['📋','Paste from Tab Site','UltimateGuitar, etc — auto-converts',()=>setMode('paste')],
          ['🎸','Search Ultimate Guitar','Live search UG\'s full catalogue',()=>setMode('ug')],
          ['🌐','Search Global Library','Browse songs shared by all users',()=>setMode('global')],
          ['📂','Import JSON File','Load a previously exported .json song',()=>fileRef.current.click()],
        ].map(([icon,title,desc,action])=>(
          <button key={title} onClick={action}
            style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
              background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:12,
              cursor:'pointer',textAlign:'left',width:'100%',transition:'background .12s'}}
            onTouchStart={e=>e.currentTarget.style.background='var(--surface2)'}
            onTouchEnd={e=>e.currentTarget.style.background='var(--surface)'}>
            <span style={{fontSize:26,width:32,textAlign:'center',flexShrink:0}}>{icon}</span>
            <div>
              <div style={{color:'var(--text)',fontWeight:700,fontSize:15,fontFamily:"'Crimson Text',Georgia,serif"}}>{title}</div>
              <div style={{color:'var(--text-sub)',fontSize:12,marginTop:1}}>{desc}</div>
            </div>
          </button>
        ))}
        {(!cfg.ghOwner)&&(
          <div style={{background:'var(--chord-bg)',border:'1px solid var(--chord-border)',borderRadius:8,padding:'9px 12px',color:'var(--text-sub)',fontSize:12,lineHeight:1.5}}>
            💡 Add your GitHub username in Settings to unlock the Global Library.
          </div>
        )}
      </div>
    </div>
  </>);
}

// ─── SONG ROW (swipe left to delete) ─────────────────────────────────────────
function SongRow({song,onSelect,onToggleLike,onDelete}){
  const[swipeX,setSwipeX]=useState(0);
  const[confirmDel,setConfirmDel]=useState(false);
  const startX=useRef(null);
  const THRESHOLD=55,DELETE_W=72;
  const onTS=e=>{startX.current=e.touches[0].clientX;};
  const onTM=e=>{if(startX.current===null)return;const dx=e.touches[0].clientX-startX.current;if(dx<0)setSwipeX(Math.max(dx,-DELETE_W));else if(swipeX<0)setSwipeX(Math.min(0,swipeX+dx*0.5));};
  const onTE=()=>{startX.current=null;setSwipeX(s=>s<-THRESHOLD?-DELETE_W:0);};
  const handleDel=e=>{e.stopPropagation();if(confirmDel){onDelete(song.id);}else{setConfirmDel(true);setTimeout(()=>setConfirmDel(false),2500);}};
  return(
    <div style={{position:'relative',overflow:'hidden',borderBottom:'1px solid var(--border)'}}>
      <div style={{position:'absolute',right:0,top:0,bottom:0,width:DELETE_W,
        background:confirmDel?'#aa1111':'#dd2222',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:2}}
        onClick={handleDel}>
        <span style={{fontSize:18}}>🗑</span>
        <span style={{color:'#fff',fontSize:11,fontFamily:"'Crimson Text',Georgia,serif",fontWeight:600}}>{confirmDel?'Sure?':'Delete'}</span>
      </div>
      <div onClick={()=>{if(swipeX===0)onSelect(song);else setSwipeX(0);}}
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        style={{display:'flex',alignItems:'center',gap:12,padding:'11px 16px',
          background:'var(--bg)',transform:`translateX(${swipeX}px)`,
          transition:startX.current===null?'transform .18s ease':'none'}}>
        <div style={{width:44,height:44,borderRadius:10,flexShrink:0,overflow:'hidden',
          background:'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',
          border:'1px solid var(--border)'}}>
          {song.cover?<img src={song.cover} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:22}}>🎵</span>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:16,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{song.title}</div>
          <div style={{color:'var(--text-sub)',fontSize:12,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{song.artist}</div>
          <div style={{display:'flex',gap:5,marginTop:5,flexWrap:'wrap'}}>
            {['Key '+song.key,song.capo>0?'Capo '+song.capo:null,song.tempo+' bpm'].filter(Boolean).map(t=><span key={t} className="tag">{t}</span>)}
          </div>
        </div>
        <button onClick={e=>{e.stopPropagation();onToggleLike(song.id);}}
          style={{background:'none',border:'none',fontSize:22,color:song.liked?'var(--danger)':'var(--text-ghost)',padding:'6px',flexShrink:0,lineHeight:1}}>
          {song.liked?'♥':'♡'}
        </button>
      </div>
    </div>
  );
}

// ─── SONG VIEW ─────────────────────────────────────────────────────────────────
function SongView({song,cfg,onBack,onEdit,onToggleLike,onContribute}){
  const[activeChord,setActiveChord]=useState(null);
  const[semitones,setSemitones]=useState(0);
  const[showCircle,setShowCircle]=useState(false);
  const[scrolling,setScrolling]=useState(false);
  const[speed,setSpeed]=useState(40);
  const[fontSize,setFontSize]=useState(16);
  const[capo,setCapo]=useState(song.capo); // local only — resets on exit
  const[showControls,setShowControls]=useState(true);
  const[contributeMsg,setContributeMsg]=useState('');
  const[contributing,setContributing]=useState(false);
  const scrollRef=useRef(null);
  const animRef=useRef(null);
  const speedRef=useRef(speed);
  const scrollAcc=useRef(0);
  const swipeStartX=useRef(null);
  const swipeStartY=useRef(null);
  const[swipeProg,setSwipeProg]=useState(0);
  speedRef.current=speed;

  useEffect(()=>{setCapo(song.capo);setSemitones(0);scrollAcc.current=0;setScrolling(false);},[song.id]);
  const scroll=useCallback(()=>{
    if(scrollRef.current){
      scrollAcc.current+=speedRef.current/60;
      const px=Math.floor(scrollAcc.current);
      if(px>=1){scrollRef.current.scrollTop+=px;scrollAcc.current-=px;}
      const{scrollTop,scrollHeight,clientHeight}=scrollRef.current;
      if(scrollTop+clientHeight>=scrollHeight-4){setScrolling(false);scrollAcc.current=0;return;}
    }
    animRef.current=requestAnimationFrame(scroll);
  },[]);
  useEffect(()=>{
    if(scrolling)animRef.current=requestAnimationFrame(scroll);
    else cancelAnimationFrame(animRef.current);
    return()=>cancelAnimationFrame(animRef.current);
  },[scrolling,scroll]);

  const onSwipeStart=useCallback(e=>{
    const t=e.touches[0];
    if(t.clientX<38){swipeStartX.current=t.clientX;swipeStartY.current=t.clientY;}
    else swipeStartX.current=null;
  },[]);
  const onSwipeMove=useCallback(e=>{
    if(swipeStartX.current===null)return;
    const dx=e.touches[0].clientX-swipeStartX.current;
    const dy=Math.abs(e.touches[0].clientY-swipeStartY.current);
    if(dy>dx*1.5){swipeStartX.current=null;setSwipeProg(0);return;}
    if(dx>0)setSwipeProg(Math.min(dx/85,1));
  },[]);
  const onSwipeEnd=useCallback(()=>{
    if(swipeStartX.current!==null&&swipeProg>=0.45)onBack();
    swipeStartX.current=null;setSwipeProg(0);
  },[swipeProg,onBack]);

  const handleContribute=async()=>{
    setContributing(true);setContributeMsg('Uploading…');
    try{await onContribute(song);setContributeMsg('✅ Added to global library!');}
    catch(e){setContributeMsg('❌ '+e.message);}
    setContributing(false);
    setTimeout(()=>setContributeMsg(''),5000);
  };

  const displayKey=txChord(song.key,semitones,FLAT_SEMS.has(((n2s(song.key)+semitones)%12+12)%12));
  const canContribute=!!(cfg.ghToken&&cfg.ghOwner&&cfg.ghRepo);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}
      onTouchStart={onSwipeStart} onTouchMove={onSwipeMove} onTouchEnd={onSwipeEnd}>
      {swipeProg>0.05&&<div style={{position:'fixed',top:0,left:0,bottom:0,width:3,background:'var(--accent)',opacity:swipeProg,zIndex:999,borderRadius:'0 2px 2px 0'}}/>}
      {activeChord&&<ChordSheet chordName={activeChord} capo={capo} onClose={()=>setActiveChord(null)}/>}
      {showCircle&&<CircleOfFifths originalKey={song.key} semitones={semitones} onChange={setSemitones} onClose={()=>setShowCircle(false)}/>}

      {/* Header */}
      <div style={{background:'var(--header-bg)',borderBottom:'1px solid var(--border)',
        padding:'10px 14px',paddingTop:'calc(10px + env(safe-area-inset-top,0px))',
        display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <button onClick={onBack} className="btn-secondary tap" style={{padding:'6px 12px',fontSize:16}}>‹</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:16,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'Crimson Text',Georgia,serif"}}>{song.title}</div>
          <div style={{color:'var(--text-sub)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {song.artist} · Key {displayKey}{semitones?` (orig. ${song.key})`:''}{capo>0?` · Capo ${capo}`:''}
          </div>
        </div>
        <button onClick={()=>onToggleLike(song.id)} style={{background:'none',border:'none',fontSize:22,color:song.liked?'var(--danger)':'var(--text-ghost)',padding:'4px',lineHeight:1,flexShrink:0}}>
          {song.liked?'♥':'♡'}
        </button>
        <button onClick={onEdit} className="btn-secondary" style={{fontSize:13,padding:'6px 12px',flexShrink:0}}>Edit</button>
      </div>

      {/* Controls */}
      {showControls&&(
        <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'8px 14px',flexShrink:0,display:'flex',flexDirection:'column',gap:7}}>
          <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
            <button onClick={()=>setScrolling(s=>!s)}
              style={{background:scrolling?'#cc2222':'var(--accent)',border:'none',borderRadius:7,
                padding:'7px 14px',color:'var(--accent-text)',fontWeight:700,fontSize:13,
                fontFamily:"'Crimson Text',Georgia,serif",cursor:'pointer',flexShrink:0}}>
              {scrolling?'⏸ Pause':'▶ Scroll'}
            </button>
            {scrolling
              ?<input type="range" min={2} max={120} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{flex:1,accentColor:'var(--accent)',minWidth:60}}/>
              :<>
                <button onClick={()=>setFontSize(f=>Math.max(11,f-1))} className="btn-ctrl tap" title="Smaller">🔍−</button>
                <button onClick={()=>setFontSize(f=>Math.min(26,f+1))} className="btn-ctrl tap" title="Larger">🔍+</button>
                <button onClick={()=>setShowCircle(true)} className="btn-ctrl tap"
                  style={{color:semitones?'var(--chord)':'var(--text-sub)',borderColor:semitones?'var(--chord-border)':'var(--border)'}}>
                  ♩{semitones?(semitones>0?` +${semitones}`:` ${semitones}`):''}
                </button>
                <select value={capo} onChange={e=>setCapo(+e.target.value)}
                  style={{background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:7,
                    color:capo>0?'var(--chord)':'var(--text-sub)',fontSize:12,padding:'5px 8px',
                    outline:'none',fontFamily:"'Crimson Text',Georgia,serif"}}>
                  <option value={0}>Capo: None</option>
                  {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>Capo {i+1}</option>)}
                </select>
              </>
            }
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <div style={{color:'var(--text-faint)',fontSize:10}}>Tap chord for diagram · tap lyrics to hide controls</div>
            {canContribute&&(
              <button onClick={handleContribute} disabled={contributing}
                style={{background:'none',border:'1px solid var(--chord-border)',borderRadius:6,

  const pushGist=async()=>{
    if(!localCfg.ghToken){setSyncStatus('❌ Enter your GitHub token first.');return;}
    setLoading(true);setSyncStatus('');
    try{
      const content=JSON.stringify(songs,null,2);
      let gistId=localCfg.ghGistId;
      if(!gistId){
        gistId=await ghCreateGist(localCfg.ghToken,content);
        updateCfg({ghGistId:gistId,lastSync:new Date().toLocaleString()});
        setSyncStatus(`✅ Created private gist and pushed ${songs.length} songs. Gist ID saved.`);

        await ghUpdateGist(localCfg.ghToken,gistId,content);
        updateCfg({lastSync:new Date().toLocaleString()});
        setSyncStatus(`✅ Pushed ${songs.length} songs to your gist.`);
      }
    }catch(e){setSyncStatus('❌ '+e.message);}
    setLoading(false);
  };

    if(!localCfg.ghGistId){setSyncStatus('❌ No gist ID saved. Push first to create one, or paste a Gist ID.');return;}
    setLoading(true);setSyncStatus('');
    try{
      const content=await ghGetGist(localCfg.ghToken,localCfg.ghGistId);

      if(window.confirm(`Replace your ${songs.length} local songs with ${parsed.length} from gist?`)){
        onReplace(parsed);
        updateCfg({lastSync:new Date().toLocaleString()});
        setSyncStatus(`✅ Pulled ${parsed.length} songs.`);

// ─── TUNER ────────────────────────────────────────────────────────────────────
function autoCorrelate(buf, sampleRate) {
  let size = buf.length;
  let rms = 0;
  for (let i = 0; i < size; i++) {
    const val = buf[i];
    rms += val * val;
  }
  rms = Math.sqrt(rms / size);
  if (rms < 0.01) return -1; // Not enough signal

  let r1 = 0, r2 = size - 1, thres = 0.2;
  for (let i = 0; i < size / 2; i++) {
    if (Math.abs(buf[i]) < thres) { r1 = i; break; }
  }
  for (let i = 1; i < size / 2; i++) {
    if (Math.abs(buf[size - i]) < thres) { r2 = size - i; break; }
  }
  buf = buf.slice(r1, r2);
  size = buf.length;

  const c = new Array(size).fill(0);
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size - i; j++) {
      c[i] = c[i] + buf[j] * buf[j + i];
    }
  }

  let d = 0;
  while (c[d] > c[d + 1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < size; i++) {
    if (c[i] > maxval) {
      maxval = c[i];
      maxpos = i;
    }
  }
  let T0 = maxpos;
  let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
  let a = (x1 + x3 - 2 * x2) / 2;
  let b = (x3 - x1) / 2;
  if (a) T0 = T0 - b / (2 * a);

  return sampleRate / T0;
}

const NOTE_STRINGS = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'G#', 'A', 'Bb', 'B'];

function getNoteFromPitch(frequency) {
  const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
  return Math.round(noteNum) + 69; // A4 is MIDI note 69
}

function getFrequencyFromNote(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

function getCents(frequency, note) {
  return Math.floor(1200 * Math.log(frequency / getFrequencyFromNote(note)) / Math.log(2));
}

  const [active, setActive] = useState(false);
  const [pitch, setPitch] = useState(0);
  const [note, setNote] = useState('-');
  const [cents, setCents] = useState(0);
  const [error, setError] = useState(null);

  const audioCtxRef = useRef(null);
  const analyserRef = useRef(null);
  const rafId = useRef(null);
  const bufRef = useRef(new Float32Array(2048));

  const startTuner = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      analyserRef.current = audioCtxRef.current.createAnalyser();
      analyserRef.current.fftSize = 2048;

      const source = audioCtxRef.current.createMediaStreamSource(stream);
      source.connect(analyserRef.current);
      setActive(true);
      setError(null);
      updatePitch();
    } catch (err) {
      setError('Microphone access denied or unavailable.');
    }
  };

  const stopTuner = () => {
    if (rafId.current) cancelAnimationFrame(rafId.current);
    if (audioCtxRef.current) {
      audioCtxRef.current.close().catch(() => {});
    }
    setActive(false);
    setPitch(0);
    setNote('-');
    setCents(0);
  };

  useEffect(() => {
    return stopTuner; // Cleanup on unmount
  }, []);

  const updatePitch = () => {
    if (!analyserRef.current) return;
    analyserRef.current.getFloatTimeDomainData(bufRef.current);
    const ac = autoCorrelate(bufRef.current, audioCtxRef.current.sampleRate);
    
    if (ac !== -1) {
      setPitch(ac);
      const noteNum = getNoteFromPitch(ac);
      setNote(NOTE_STRINGS[noteNum % 12]);
      setCents(getCents(ac, noteNum));
    } else {
      setPitch(0);
    }
    rafId.current = requestAnimationFrame(updatePitch);
  };

  // Dial positioning: -50 to +50 cents -> -45deg to +45deg visually
  const dialRotation = Math.max(-45, Math.min(45, (cents / 50) * 45));
  const isTuned = pitch > 0 && Math.abs(cents) <= 5;

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <div style={{ background: 'var(--header-bg)', borderBottom: '1px solid var(--border)',
        padding: '16px 18px 14px', paddingTop: 'calc(16px + env(safe-area-inset-top,0px))' }}>
        <div style={{ fontSize: 22, fontWeight: 700, color: 'var(--text)', fontFamily: "'Crimson Text',Georgia,serif" }}>Guitar Tuner</div>
        <div style={{ color: 'var(--text-faint)', fontSize: 12, marginTop: 2 }}>Standard Chromatic</div>
      </div>
      
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
        {error ? (
          <div style={{ color: 'var(--danger)', textAlign: 'center', marginBottom: 20, fontSize: 14 }}>{error}</div>
        ) : null}

        {!active ? (
          <div style={{ textAlign: 'center' }}>
            <div style={{ color: 'var(--text-sub)', marginBottom: 24, fontSize: 14 }}>
              Enable your microphone to tune your guitar.
            </div>
            <button className="btn-primary" onClick={startTuner} style={{ fontSize: 16, padding: '12px 24px', borderRadius: 24 }}>
              Start Tuner
            </button>
          </div>
        ) : (
          <div style={{ width: '100%', maxWidth: 320, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 30 }}>
            {/* Display Note */}
            <div style={{ 
              fontSize: 80, fontWeight: 700, fontFamily: "'Crimson Text',Georgia,serif", 
              color: isTuned ? '#1a7a3a' : 'var(--text)', 
              textShadow: isTuned ? '0 0 20px rgba(26,122,58,0.3)' : 'none',
              transition: 'color 0.2s',
              height: 100, display: 'flex', alignItems: 'center', justifyContent: 'center' 
            }}>
              {pitch > 0 ? note : '–'}
            </div>

            {/* Hz display */}
            <div style={{ color: 'var(--text-faint)', fontSize: 15, fontFamily: 'monospace' }}>
              {pitch > 0 ? pitch.toFixed(1) + ' Hz' : 'Listening...'}
            </div>

            {/* Visual Dial Canvas */}
            <div style={{ position: 'relative', width: 240, height: 120, overflow: 'hidden', marginTop: 10 }}>
              {/* Arc graphic */}
              <svg width="240" height="120" style={{ position: 'absolute', bottom: 0 }}>
                <path d="M 20 120 A 100 100 0 0 1 220 120" fill="none" stroke="var(--surface3)" strokeWidth="6" strokeLinecap="round" />
                <path d="M 105 120 A 100 100 0 0 1 135 120" fill="none" stroke="rgba(26,122,58,0.3)" strokeWidth="8" strokeLinecap="round" />
                <line x1="120" y1="20" x2="120" y2="35" stroke="var(--border2)" strokeWidth="2" />
                <line x1="50" y1="49" x2="60" y2="59" stroke="var(--border2)" strokeWidth="2" />
                <line x1="190" y1="49" x2="180" y2="59" stroke="var(--border2)" strokeWidth="2" />
              </svg>

              {/* Needle */}
              <div style={{
                position: 'absolute', bottom: -5, left: '50%', width: 4, height: 95,
                background: isTuned ? '#1a7a3a' : 'var(--accent)',
                transformOrigin: 'bottom center',
                transform: `translateX(-50%) rotate(${pitch > 0 ? dialRotation : 0}deg)`,
                transition: 'transform 0.1s linear, background 0.2s',
                borderRadius: 2
              }} />
            </div>

            {/* Cents reading */}
            <div style={{ 
              background: 'var(--surface)', padding: '6px 16px', borderRadius: 20, 
              border: '1px solid var(--border)', fontSize: 13, color: 'var(--text-sub)', fontWeight: 600 
            }}>
              {pitch > 0 ? (cents > 0 ? `+${cents}` : cents) : '0'} cents
            </div>

            <button onClick={stopTuner} style={{
              marginTop: 20, background: 'var(--surface2)', border: 'none', padding: '10px 20px', 
              borderRadius: 20, color: 'var(--text-sub)', fontWeight: 600, cursor: 'pointer', fontFamily: "'Crimson Text',Georgia,serif"
            }}>Stop Tuning</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[songs,setSongs]=useState(loadSongs);
  const[cfg,setCfg]=useState(loadCfg);
  const[view,setView]=useState('home');
  const[selected,setSelected]=useState(null);
  const[editing,setEditing]=useState(null);
  const[mainTab,setMainTab]=useState('library');
  const[showNewSheet,setShowNewSheet]=useState(false);
  const[deferredPrompt,setDeferredPrompt]=useState(null);

  useEffect(()=>{
    const h=e=>{
      e.preventDefault();
      console.log('✨ beforeinstallprompt fired');
      setDeferredPrompt(e);
    };
    window.addEventListener('beforeinstallprompt',h);
    if(window.capturedPrompt){
      console.log('✨ Using captured prompt');
      setDeferredPrompt(window.capturedPrompt);
    }
    return ()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);

  const installApp=async()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    if(outcome==='accepted')setDeferredPrompt(null);
  };

  useEffect(()=>{applyTheme(getStoredTheme());},[]);
  useEffect(()=>saveSongs(songs),[songs]);

  const updSong=(id,patch)=>setSongs(ss=>ss.map(s=>s.id===id?{...s,...patch}:s));
  const delSong=id=>{setSongs(ss=>ss.filter(s=>s.id!==id));if(selected?.id===id){setSelected(null);setView('home');}};
  const handleCfgChange=next=>{setCfg(next);saveCfg(next);};

  // Contribute a song to the global library in the GitHub repo
  const contributeSong=async(song)=>{
    const{ghToken,ghOwner,ghRepo}=cfg;
    if(!ghToken||!ghOwner||!ghRepo)throw new Error('Set your GitHub token and repo in Settings first.');
    const filename=slugify(song.title,song.artist)+'.json';
    const songData={...song,cover:null}; // no base64 images in the repo
    const songJson=JSON.stringify(songData,null,2);

    // Upsert the song file
    const existing=await ghGetFile(ghOwner,ghRepo,'songs/'+filename,ghToken);
    await ghPutFile(ghOwner,ghRepo,'songs/'+filename,songJson,
      `Add: ${song.title} by ${song.artist}`,ghToken,existing?.sha||null);

    // Update songs/index.json
    const idxFile=await ghGetFile(ghOwner,ghRepo,'songs/index.json',ghToken);
    let index=idxFile?JSON.parse(idxFile.content):[];
    const entry={id:slugify(song.title,song.artist),title:song.title,artist:song.artist,
                 key:song.key,capo:song.capo||0,filename};
    const existingIdx=index.findIndex(e=>e.id===entry.id);
    if(existingIdx>=0)index[existingIdx]=entry;else index.push(entry);
    index.sort((a,b)=>a.title.localeCompare(b.title));
    await ghPutFile(ghOwner,ghRepo,'songs/index.json',JSON.stringify(index,null,2),
      'Update songs index',ghToken,idxFile?.sha||null);
  };

  const TABS=[{id:'library',label:'Library',icon:'♪'},{id:'chords',label:'Chords',icon:'🎸'},{id:'tuner',label:'Tuner',icon:'📻'},{id:'settings',label:'Settings',icon:'⚙'}];

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {showNewSheet&&(
        <NewSongSheet cfg={cfg}
          onClose={()=>setShowNewSheet(false)}
          onWriteNew={()=>{setEditing(null);setView('editor');}}
          onImport={song=>setSongs(ss=>[...ss,song])}/>
      )}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {view==='home'&&mainTab==='library'&&(
          <HomePage songs={songs}
            onSelect={s=>{setSelected(s);setView('song');}}
            onToggleLike={id=>updSong(id,{liked:!songs.find(s=>s.id===id).liked})}
            onDelete={delSong}
            onNew={()=>setShowNewSheet(true)}/>
        )}
        {view==='home'&&mainTab==='chords'&&<BrowseView/>}
        {view==='home'&&mainTab==='tuner'&&<TunerView/>}
        {view==='home'&&mainTab==='settings'&&(
          <SettingsView songs={songs} cfg={cfg} onCfgChange={handleCfgChange} onReplace={setSongs} 
            deferredPrompt={deferredPrompt} onInstall={installApp}/>
        )}
        {view==='song'&&selected&&(
          <SongView
            song={songs.find(s=>s.id===selected.id)||selected}
            cfg={cfg}
            onBack={()=>{setSelected(null);setView('home');}}
            onEdit={()=>{setEditing(songs.find(s=>s.id===selected.id)||selected);setView('editor');}}
            onToggleLike={id=>updSong(id,{liked:!songs.find(s=>s.id===id).liked})}
            onContribute={contributeSong}/>
        )}
        {view==='editor'&&(
          <SongEditor
            song={editing}
            onSave={saved=>{
              setSongs(ss=>ss.find(s=>s.id===saved.id)?ss.map(s=>s.id===saved.id?saved:s):[...ss,saved]);
              setSelected(saved);setView('song');
            }}
            onBack={()=>setView(selected?'song':'home')}
            onDelete={id=>{delSong(id);setEditing(null);setView('home');}}/>
        )}
      </div>

      {/* Bottom nav — always bottom-justified with safe area */}
      {view==='home'&&(
        <div style={{flexShrink:0,display:'flex',background:'var(--header-bg)',
          borderTop:'1.5px solid var(--border)',
          paddingBottom:'env(safe-area-inset-bottom,0px)',zIndex:10}}>
          {TABS.map(({id,label,icon})=>(
            <button key={id} onClick={()=>setMainTab(id)}
              style={{flex:1,padding:'8px 0',minHeight:54,background:'transparent',border:'none',
                display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer'}}>
              <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
              <span style={{fontSize:10,fontFamily:"'Crimson Text',Georgia,serif",fontWeight:mainTab===id?700:400,
                color:mainTab===id?'var(--accent)':'var(--text-faint)'}}>{label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

try{
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
}catch(e){
  document.getElementById('root').innerHTML=`<pre style="color:#cc2222;padding:24px;font-size:13px">${String(e)}\n\n${e.stack||''}</pre>`;
}
